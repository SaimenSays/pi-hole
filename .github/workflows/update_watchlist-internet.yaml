name: Update Watchlist-Internet Blocklist

on:
  schedule:
    - cron: "0 3 * * 1"   # jeden Montag um 03:00 Uhr
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-blocklist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade pip requests

      - name: Generate blocklist
        run: python generate_watchlist-internet.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add watchlist-internet.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update watchlist-internet blocklist"
            git push
          fi
